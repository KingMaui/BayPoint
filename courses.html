<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Map</title>
  <meta name="description" content="Find golf courses around the world. Interactive map with search and filters.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

  <!-- Styles: shared nav/modal, then page-specific -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/courses.css">
</head>
<body>

  <!-- ── NAVIGATION ─────────────────────────────────── -->
  <nav id="main-nav">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="14" r="4" fill="white"/>
          <rect x="9.2" y="1.5" width="1.6" height="10" rx="0.8" fill="white"/>
          <path d="M10.8 2 L17 5.8 L10.8 9.6 Z" fill="white" opacity="0.75"/>
        </svg>
      </div>
      <span class="nav-logo-text">Weekend Birdie</span>
    </a>

    <ul class="nav-links">
      <li><a href="index.html#how-it-works">How it works</a></li>
      <li><a href="courses.html" style="color:var(--green-mid); font-weight:500;">Course map</a></li>
      <li><a href="scorecard.html">My Stats</a></li>
    </ul>

    <div class="nav-right">
      <a href="#" class="btn-login"  id="btn-login-nav"  onclick="openModal(event)">Log in</a>
      <a href="#" class="btn-signup" id="btn-signup-nav" onclick="openModal(event,'signup')">Get started</a>

      <div class="profile-avatar" id="profile-avatar" onclick="toggleProfileDropdown()">
        <span id="avatar-initials"></span>
        <div class="profile-dropdown" id="profile-dropdown">
          <a href="#">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M2.5 12c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            My profile
          </a>
          <a href="scorecard.html">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="2" y="3" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5 3V2.5a2 2 0 014 0V3" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            My scorecards
          </a>
          <a href="scorecard.html?tab=new-round">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            New round
          </a>
          <div class="dd-divider"></div>
          <a href="#" class="logout" onclick="logout()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M9 2h2.5a.5.5 0 01.5.5v9a.5.5 0 01-.5.5H9M6 4.5L3.5 7 6 9.5M3.5 7H10"
                stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Log out
          </a>
        </div>
      </div>
    </div>
  </nav>


  <!-- ── SEARCH & FILTER BAR ────────────────────────── -->
  <div class="controls-bar">

    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="4.5"/>
        <path d="M10.5 10.5l3 3"/>
      </svg>
      <input type="text" id="course-search" placeholder="Search courses, cities, states…" oninput="applyFilters()">
    </div>

    <div class="divider-v"></div>

    <div class="filter-group">
      <span class="filter-label">Tees</span>
      <button class="filter-pill active" data-tee="all"   onclick="setTeePill(this)">All</button>
      <button class="filter-pill"        data-tee="white" onclick="setTeePill(this)">White</button>
      <button class="filter-pill"        data-tee="blue"  onclick="setTeePill(this)">Blue</button>
      <button class="filter-pill"        data-tee="black" onclick="setTeePill(this)">Black</button>
      <button class="filter-pill"        data-tee="red"   onclick="setTeePill(this)">Red</button>
    </div>

    <div class="divider-v"></div>

    <div class="filter-group">
      <span class="filter-label">Country</span>
      <select class="filter-select" id="filter-country" onchange="applyFilters()">
        <option value="all">All</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">Par</span>
      <select class="filter-select" id="filter-par" onchange="applyFilters()">
        <option value="all">Any</option>
        <option value="70">70</option>
        <option value="71">71</option>
        <option value="72">72</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">Difficulty</span>
      <select class="filter-select" id="filter-slope" onchange="applyFilters()">
        <option value="all">Any</option>
        <option value="easy">Easy (slope &lt;120)</option>
        <option value="medium">Medium (120–135)</option>
        <option value="hard">Challenging (&gt;135)</option>
      </select>
    </div>

    <div class="filter-group">
      <span class="filter-label">Holes</span>
      <select class="filter-select" id="filter-holes" onchange="applyFilters()">
        <option value="all">Any</option>
        <option value="9">9</option>
        <option value="18">18</option>
        <option value="27">27</option>
      </select>
    </div>

    <div class="divider-v"></div>

    <button class="filter-pill" onclick="resetFilters()" style="color:var(--text-muted);">Reset</button>

    <span class="results-count" id="results-count">Loading…</span>
  </div>


  <!-- ── MAP + SIDEBAR ──────────────────────────────── -->
  <div class="map-layout">

    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Golf courses</div>
        <div class="sidebar-sub" id="sidebar-sub">Loading courses…</div>
      </div>
      <div class="course-list" id="course-list">
        <div class="list-loading">Loading courses…</div>
      </div>
    </div>

    <div id="map"></div>

  </div>


  <!-- ── LOGIN / SIGNUP MODAL ───────────────────────── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">&#10005;</button>

      <div class="modal-logo">
        <div class="modal-logo-mark">
          <svg viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="14" r="4" fill="white"/>
            <rect x="9.2" y="1.5" width="1.6" height="10" rx="0.8" fill="white"/>
            <path d="M10.8 2 L17 5.8 L10.8 9.6 Z" fill="white" opacity="0.75"/>
          </svg>
        </div>
        <span>Weekend Birdie</span>
      </div>

      <div class="modal-tabs">
        <button class="modal-tab active" id="tab-login"  onclick="switchTab('login')">Log in</button>
        <button class="modal-tab"        id="tab-signup" onclick="switchTab('signup')">Sign up</button>
      </div>

      <div id="login-form">
        <div class="modal-field"><label>Email</label><input type="email" id="login-email"></div>
        <div class="modal-field"><label>Password</label><input type="password" id="login-pass"></div>
        <button class="modal-btn" onclick="doLogin()">Log in</button>
        <div class="modal-footer-note">Forgot your password? <a href="#">Reset it</a></div>
      </div>

      <div id="signup-form" style="display:none;">
        <div class="modal-grid-2">
          <div class="modal-field"><label>First name</label><input type="text" id="signup-first" placeholder="Tiger"></div>
          <div class="modal-field"><label>Last name</label><input type="text" id="signup-last" placeholder="W."></div>
        </div>
        <div class="modal-field"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com"></div>
        <div class="modal-field"><label>Password</label><input type="password" id="signup-pass" placeholder="Min. 8 characters"></div>
        <button class="modal-btn" onclick="doSignup()">Create account</button>
        <div class="modal-footer-note">Already have an account? <a href="#" onclick="switchTab('login'); return false;">Log in</a></div>
      </div>

    </div>
  </div>


  <!-- ── SCRIPTS ────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/pb.js"></script>

</body>
</html>
